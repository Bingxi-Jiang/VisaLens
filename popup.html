<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>JobLens Launcher</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 240px;
      padding: 14px;
      margin: 0;
      background: #fff;
      color: #111;
      box-sizing: border-box;
    }

    h1 {
      font-size: 16px;
      margin: 0 0 12px;
    }

    .button {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 11px 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      background: #111;
      color: #fff;
      margin-top: 8px;
    }

    .button.secondary {
      background: #f3f4f8;
      color: #111;
      border: 1px solid #e6e8ef;
    }

    .meta {
      margin-top: 12px;
      font-size: 12px;
      color: #666;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>JobLens</h1>

  <button id="openBtn" class="button">Open JobLens</button>
  <button id="minimizeBtn" class="button secondary">Minimize</button>
  <button id="hideBtn" class="button secondary">Hide for This Page</button>

  <div id="status" class="meta">Launcher ready.</div>

  <script src="popup.js"></script>
</body>
</html>

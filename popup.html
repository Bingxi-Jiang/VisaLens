<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Job Filter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 280px;
      padding: 14px;
      margin: 0;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 12px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 10px 0;
    }
    .meta {
      margin-top: 14px;
      font-size: 12px;
      color: #555;
      line-height: 1.5;
    }
    .block {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #e5e5e5;
    }
  </style>
</head>
<body>
  <h1>Job Context Filter</h1>

  <div class="row">
    <span>Enable scanning</span>
    <input type="checkbox" id="enabled" />
  </div>

  <div class="row">
    <span>Show page overlay</span>
    <input type="checkbox" id="showOverlay" />
  </div>

  <div class="row">
    <span>Highlight matched words</span>
    <input type="checkbox" id="highlightMatches" />
  </div>

  <div class="block meta" id="lastScan">
    No scan data yet.
  </div>

  <script src="popup.js"></script>
</body>
</html>
